<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <link href="/favicon.ico" rel="icon">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Platform - Admin</title>
    <meta content="" name="keywords" />
    <meta content="website" property="og:type">
    <meta content="template" property="og:url">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <!-- css -->
    <link rel="stylesheet" crossorigin="" href="admin/css/default.css">
    <link rel="stylesheet" href="admin/css/style.css">
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- jq -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
        integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"
        integrity="sha512-onMTRKJBKz8M1TnqqDuGBlowlH0ohFzMXYRNebz+yOcc5TQr/zAKsthzhuv0hiyUKEiQEQXEynnXCvNTOk50dg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
      
    </style>

    <script>
        $(function () {
            function bindPcNavHover() {
                const isPc = $(window).width() >= 1400;

                if (isPc) {
                    $('.nav_1depth')
                    .off('.pcNav')
                    .on('mouseenter.pcNav', function () {
                        $(this).children('.nav_2depth').stop(true, true).slideDown(200);
                    })
                    .on('mouseleave.pcNav', function () {
                        $(this).children('.nav_2depth').stop(true, true).slideUp(200);
                    });
                } else {
                    $('.nav_1depth').off('.pcNav');
                    $('.nav_2depth').removeAttr('style');
                }
            }

            bindPcNavHover();
            $(window).on('resize', bindPcNavHover);

            $('body').removeClass('no-scroll');
            $('.nav_open').click(function () {
                $(this).toggleClass('active');
                $('nav > ul').toggleClass('open');
                if ($(this).hasClass('active')) {
                    $('body').addClass('no-scroll');
                } else {
                    $('body').removeClass('no-scroll');
                }
            });

            /*  모달닫기 */
            $('.modal_close, .modal_btn_cancel').on('click', function () {
                $('.modal_pass_overlay').fadeOut(200, function () {
                    $(this).remove();
                });
            });
        });
    </script>
</head>

<body>
    <div id="wrap">
        <div class="admin">
            <div class="adm_login_wrap">
                <div class="login_form">
                    <h2>ADMINISTRATOR LOGIN</h2>
                    <div class="login_box">
                        <div class="login_box_input">
                            <input type="text" placeholder="아이디">
                            <input type="password" placeholder="비밀번호">
                        </div>
                        <input type="submit" class="login_btn" value="로그인" onclick="location.href='adm/user/list.html'">
                    </div>
                    <p>Copyrights Ministry of environment. All Right Reserved..</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 비밀번호 변경 모달
         (비밀번호 초기화 후 최초 로그인 시 노출) -->
    <div class="modal_pass_overlay">
        <div class="passmodal_box">

            <div class="modal_header">
                <h3 class="modal_title">비밀번호 변경</h3>
                <button class="modal_close" aria-label="닫기">&#x2715;</button>
            </div>

            <div class="modal_notice">
                <span class="modal_notice_icon">※</span>
                <p>
                    비밀번호 초기화 이후, 최초 로그인 시 비밀번호를 변경하셔야 합니다.<br>
                    <strong>(비밀번호 규칙 : 영문(대/소문자), 숫자, 특수문자 중 최소 2가지 이상, 8글자 이상)</strong>
                </p>
            </div>

            <div class="modal_input_group">
                <input class="modal_input" type="password" placeholder="비밀번호">
                <input class="modal_input" type="password" placeholder="비밀번호 확인">
            </div>

            <div class="modal_btn_group">
                <button class="modal_btn modal_btn_cancel">취소</button>
                <button class="modal_btn modal_btn_confirm">확인</button>
            </div>

        </div>
    </div>

</body>
</html>
