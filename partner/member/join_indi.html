<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <link href="/favicon.ico" rel="icon">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Platform - Partner</title>
    <meta content="" name="keywords" />
    <meta content="website" property="og:type">
    <meta content="template" property="og:url">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <!-- css -->
    <link rel="stylesheet" crossorigin="" href="../css/default.css">
    <link rel="stylesheet" href="../css/style.css">
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
        rel="stylesheet" />
    <!-- jq -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
    <script>
        $(function () {
            function bindPcNavHover() {
                const isPc = $(window).width() >= 720;

                if (isPc) {
                    $('.nav_1depth')
                        .off('.pcNav')
                        .on('mouseenter.pcNav', function () {
                            $(this).children('.nav_2depth').stop(true, true).slideDown(200);
                        })
                        .on('mouseleave.pcNav', function () {
                            $(this).children('.nav_2depth').stop(true, true).slideUp(200);
                        });
                } else {
                    $('.nav_1depth').off('.pcNav');
                    $('.nav_2depth').removeAttr('style');
                }
            }

            bindPcNavHover();
            $(window).on('resize', bindPcNavHover);

            $('body').removeClass('no-scroll');
            $('.nav_open').click(function () {
                $(this).toggleClass('active');
                $('nav > ul').toggleClass('open');

                if ($(this).hasClass('active')) {
                    $('body').addClass('no-scroll');
                } else {
                    $('body').removeClass('no-scroll');
                }
            });
        });
    </script>
</head>
